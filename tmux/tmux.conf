# ============================================================================
# General Settings
# ============================================================================

set -g default-terminal "tmux-256color"
set -ga terminal-overrides ',*:Ss=\E[6 q:Se=\E[2 q'

# Faster command sequences (no delay for escape key)
set -sg escape-time 0

# Focus events for terminal
set -g focus-events on

# Start window/pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Aggressive resize (useful for different sized displays)
setw -g aggressive-resize on

# Enable mouse support
set -g mouse on

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity off

# Allow automatic renaming of windows
setw -g automatic-rename on

# Set terminal title
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# ============================================================================
# Key Bindings
# ============================================================================

# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a last-window
bind a send-prefix

# Rename window and reload config
bind r command-prompt "rename-window '%%'"
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Open session list
bind o choose-session

# Move windows left/right (Shift+H / Shift+L)
bind -r H swap-window -t -1\; select-window -t -1
bind -r L swap-window -t +1\; select-window -t +1

# Split panes (vim-style: s for horizontal split, v for vertical split)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill pane without confirmation
bind x kill-pane

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Rotate panes in current window
bind Tab   rotate-window
bind BTab  rotate-window -U

# Vim-style pane resizing (hold Ctrl+h/j/k/l after prefix)
bind -r -T prefix C-h resize-pane -L 5
bind -r -T prefix C-j resize-pane -D 5
bind -r -T prefix C-k resize-pane -U 5
bind -r -T prefix C-l resize-pane -R 5

# Repeat time for resize mode (how long you can hold keys)
set -g repeat-time 1000

# Layouts (Space cycles, Alt+1..5 for direct access)
bind Space next-layout
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# Move current pane to another window (prompts for target window number)
bind m command-prompt -p "Move pane to window:" "join-pane -t :%%"

# Pull a pane from another window into the current window (prompts for source window number)
bind M command-prompt -p "Pull pane from window:" "join-pane -s :%%"

# Synchronize panes toggle
bind S setw synchronize-panes

# Floating popups
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"

# Copy mode using vi keys
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer

# Vim-style copy/paste (tmux 2.4+)
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
bind -T copy-mode-vi 'V' send -X select-line
bind -T copy-mode-vi 'r' send -X rectangle-toggle

# NESTED TMUX SUPPORT (F12 to toggle)
# When enabled, local tmux ignores commands and passes them to remote tmux
bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  set status-style "#{@off_status_style}" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# ============================================================================
# Visual Settings
# ============================================================================

# Status bar
set -g status-position top
set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 120
set -g status-style "fg=white,bg=colour234"
set -g @off_status_style "fg=colour241,bg=colour236"
set -g status-left "#[fg=green,bold]#S #[fg=white]| "
set -g status-right "#{?client_prefix,#[reverse] WAIT #[noreverse] ,}#[fg=white]#[fg=cyan]%-d %b %Y #[fg=white]| #[fg=cyan]%H:%M"
setw -g window-status-format "#[fg=colour244] #I:#W#F "
setw -g window-status-current-format "#[fg=colour166,bold] #I:#W#F "

# Pane borders
set -g pane-border-lines simple
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour166"

# Messages
set -g message-style "fg=white,bg=colour166,bold"
set -g display-panes-active-colour colour166
set -g display-panes-colour colour244

# Clock
setw -g clock-mode-style 24
setw -g clock-mode-colour colour166

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }

# ============================================================================
# Local Customizations
# ============================================================================

# OSC 52 clipboard — syncs tmux copy to local clipboard over SSH
set -s set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Load local customizations if they exist
if-shell "[ -f ~/.config/tmux/tmux.conf.local ]" "source ~/.config/tmux/tmux.conf.local"
