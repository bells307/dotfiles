source-file ~/.config/tmux/options.conf
source-file ~/.config/tmux/bindings.conf

# Auto-detect system appearance and apply matching theme
run-shell '~/.config/tmux/detect-theme.sh'
set-hook -g client-focus-in 'run-shell "~/.config/tmux/detect-theme.sh"'

# Load local customizations if they exist
if-shell "[ -f ~/.config/tmux/tmux.conf.local ]" "source ~/.config/tmux/tmux.conf.local"
