# ============================================================================
# General Settings
# ============================================================================

# Enable 256 color support
set -g default-terminal "screen-256color"

# Increase scrollback buffer
set -g history-limit 10000

# Start window/pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Enable mouse support
set -g mouse on

# Faster command sequences (no delay for escape key)
set -sg escape-time 0

# Focus events for terminal
set -g focus-events on

# Aggressive resize (useful for different sized displays)
setw -g aggressive-resize on

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity off

# ============================================================================
# Key Bindings
# ============================================================================

# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a last-window
bind a send-prefix

# Rename window and reload config
bind r command-prompt "rename-window '%%'"
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Split panes (vim-style: s for horizontal split, v for vertical split)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill pane without confirmation
bind x kill-pane

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Open session list
bind o choose-session

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Move windows left/right (Shift+H / Shift+L)
bind -r H swap-window -t -1\; select-window -t -1
bind -r L swap-window -t +1\; select-window -t +1

# Swap current pane with previous/next
bind -r < swap-pane -U
bind -r > swap-pane -D

# Rotate panes in current window
bind Tab   rotate-window
bind BTab  rotate-window -U

# Vim-style pane resizing (hold Ctrl+h/j/k/l after prefix)
bind -r -T prefix C-h resize-pane -L 5
bind -r -T prefix C-j resize-pane -D 5
bind -r -T prefix C-k resize-pane -U 5
bind -r -T prefix C-l resize-pane -R 5

# Repeat time for resize mode (how long you can hold keys)
set -g repeat-time 1000

# Layouts (Space cycles, Alt+1..5 for direct access)
bind Space next-layout
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# Break current pane into a new window
bind b break-pane -d

# Move current pane to another window (prompts for target window number)
bind m command-prompt -p "Move pane to window:" "join-pane -t :%%"

# Pull a pane from another window into the current window (prompts for source window number)
bind M command-prompt -p "Pull pane from window:" "join-pane -s :%%"

# Synchronize panes toggle
bind S setw synchronize-panes

# Copy mode using vi keys
setw -g mode-keys vi
bind [ copy-mode
bind ] paste-buffer

# Vim-style copy/paste (tmux 2.4+)
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind -T copy-mode-vi 'V' send -X select-line
bind -T copy-mode-vi 'r' send -X rectangle-toggle

# NESTED TMUX SUPPORT (F12 to toggle)
# When enabled, local tmux ignores commands and passes them to remote tmux
bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=colour247,bg=colour253" \;\
  set window-status-current-format "#[fg=colour247,bg=colour253] #I:#W#F " \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  set -u window-status-current-format \;\
  refresh-client -S

# ============================================================================
# Visual Settings
# ============================================================================

# Status bar position
set -g status-position top

# Status bar refresh interval
set -g status-interval 1

# Status bar lengths
set -g status-left-length 30
set -g status-right-length 120

# Weather location
set -g @weather_location "Moscow"

# Clock style
setw -g clock-mode-style 24

# Theme colors (toggle with theme-toggle)
source-file ~/.config/tmux/current-theme.conf

# ============================================================================
# Additional Settings
# ============================================================================

# Allow automatic renaming of windows
setw -g automatic-rename on

# Set terminal title
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# Enable clipboard (requires external tools like xclip/pbcopy)
# Uncomment if available on your system
# bind -T copy-mode-vi y send -X copy-pipe-and-cancel "xclip -sel clip -i"

# Load local customizations if they exist
if-shell "[ -f ~/.config/tmux/tmux.conf.local ]" "source ~/.config/tmux/tmux.conf.local"
