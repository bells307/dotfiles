set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*:Tc"

# OSC 52 clipboard — syncs tmux copy to local clipboard over SSH
set -s set-clipboard on
set -ga terminal-overrides ',*:Ms=\E]52;%p1%s;%p2%s\007'

# Faster command sequences (no delay for escape key)
set -sg escape-time 0

# Focus events for terminal
set -g focus-events on

# Start window/pane numbering at 1 (easier to reach on keyboard)
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set -g renumber-windows on

# Aggressive resize (useful for different sized displays)
setw -g aggressive-resize on

# Enable mouse support
set -g mouse on

# Enable activity alerts
setw -g monitor-activity on
set -g visual-activity off

# Allow automatic renaming of windows
setw -g automatic-rename on

# Set terminal title
set -g set-titles on
set -g set-titles-string '#S:#I.#P #W'

# Repeat time for resize mode (how long you can hold keys)
set -g repeat-time 1000

# Copy mode using vi keys
setw -g mode-keys vi

# Status bar
set -g status-position top
set -g status-interval 1
set -g status-left-length 30
set -g status-right-length 120

# Messages
set -g display-panes-active-colour colour166
set -g display-panes-colour colour244

# Clock
setw -g clock-mode-style 24
setw -g clock-mode-colour colour166
