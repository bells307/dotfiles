# Change prefix from Ctrl-b to Ctrl-a (easier to reach)
unbind C-b
set -g prefix C-a
bind C-a last-window
bind a send-prefix

# Rename window and reload config
bind r command-prompt "rename-window '%%'"
bind R source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# Create new window in current path
bind c new-window -c "#{pane_current_path}"

# Open session list
bind o choose-session

# Move windows left/right (Shift+H / Shift+L)
bind -r H swap-window -t -1\; select-window -t -1
bind -r L swap-window -t +1\; select-window -t +1

# Split panes (vim-style: s for horizontal split, v for vertical split)
bind s split-window -v -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill pane without confirmation
bind x kill-pane

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Rotate panes in current window
bind Tab   rotate-window
bind BTab  rotate-window -U

# Vim-style pane resizing (hold Ctrl+h/j/k/l after prefix)
bind -r C-h resize-pane -L 5
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5

# Maximize/equalize pane size 
bind | resize-pane -x 999
bind _ resize-pane -y 999
bind = select-layout -E

# Layouts (Space cycles, Alt+1..5 for direct access)
bind Space next-layout
bind M-1 select-layout even-horizontal
bind M-2 select-layout even-vertical
bind M-3 select-layout main-horizontal
bind M-4 select-layout main-vertical
bind M-5 select-layout tiled

# Move current pane to another window (interactive picker)
bind m choose-window "join-pane -t '%%'"

# Pull a pane from another window into the current one (interactive picker)
bind M choose-window "join-pane -s '%%'"

# Synchronize panes toggle
bind S setw synchronize-panes

# Floating popups
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}"
bind g display-popup -E -w 80% -h 80% -d "#{pane_current_path}" "lazygit"

# Copy/paste
bind [ copy-mode
bind ] paste-buffer

# Vim-style copy/paste (tmux 2.4+)
bind -T copy-mode-vi 'v' send -X begin-selection
bind -T copy-mode-vi 'y' send -X copy-pipe-and-cancel
bind -T copy-mode-vi 'V' send -X select-line

# NESTED TMUX SUPPORT (F12 to toggle)
# When enabled, local tmux ignores commands and passes them to remote tmux
bind -T root F12  \
  set prefix None \;\
  set key-table off \;\
  set status-style "#{@off_status_style}" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S \;\

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+/)?g?\\.?(view|l?n?vim?x?|fzf)(diff)?(-wrapped)?$'"
bind-key -n 'C-h' if-shell "$is_vim" { send-keys C-h } { if-shell -F '#{pane_at_left}'   {} { select-pane -L } }
bind-key -n 'C-j' if-shell "$is_vim" { send-keys C-j } { if-shell -F '#{pane_at_bottom}' {} { select-pane -D } }
bind-key -n 'C-k' if-shell "$is_vim" { send-keys C-k } { if-shell -F '#{pane_at_top}'    {} { select-pane -U } }
bind-key -n 'C-l' if-shell "$is_vim" { send-keys C-l } { if-shell -F '#{pane_at_right}'  {} { select-pane -R } }

bind-key -T copy-mode-vi 'C-h' if-shell -F '#{pane_at_left}'   {} { select-pane -L }
bind-key -T copy-mode-vi 'C-j' if-shell -F '#{pane_at_bottom}' {} { select-pane -D }
bind-key -T copy-mode-vi 'C-k' if-shell -F '#{pane_at_top}'    {} { select-pane -U }
bind-key -T copy-mode-vi 'C-l' if-shell -F '#{pane_at_right}'  {} { select-pane -R }
